<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlowDesk — Workflow & Checklist Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --surface3: #f1f5f9;
  --border: #e2e8f0;
  --border2: #cbd5e1;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --accent-mid: #dbeafe;
  --accent2: #059669;
  --accent2-light: #ecfdf5;
  --accent3: #d97706;
  --accent3-light: #fffbeb;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --text: #0f172a;
  --text2: #334155;
  --muted: #64748b;
  --muted2: #94a3b8;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.06), 0 4px 6px rgba(0,0,0,.03);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; overflow: hidden;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  font-size: 14px; line-height: 1.5;
}

/* AUTH */
#auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px 32px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); }
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.auth-logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: .8rem; font-weight: 800; }
.auth-logo-text { font-weight: 700; font-size: 1rem; letter-spacing: -.02em; }
.auth-title { font-weight: 700; font-size: 1.1rem; letter-spacing: -.02em; margin-bottom: 4px; }
.auth-subtitle { font-size: .82rem; color: var(--muted); margin-bottom: 24px; }
.auth-tabs { display: flex; margin-bottom: 22px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.auth-tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: .82rem; font-weight: 500; color: var(--muted); transition: all .1s; background: var(--surface2); }
.auth-tab.active { background: var(--accent); color: white; font-weight: 600; }
.auth-field { margin-bottom: 14px; }
.auth-field label { font-size: .76rem; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; }
.auth-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 9px 12px; font-family: 'Inter', sans-serif; font-size: .84rem; outline: none; transition: border-color .1s, box-shadow .1s; }
.auth-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.auth-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: .84rem; font-weight: 600; cursor: pointer; transition: background .1s; margin-top: 4px; }
.auth-btn:hover { background: #1d4ed8; }
.auth-btn:disabled { background: var(--muted2); cursor: not-allowed; }
.auth-error { background: var(--danger-light); border: 1px solid #fecaca; border-radius: var(--radius); padding: 9px 12px; font-size: .8rem; color: var(--danger); margin-bottom: 14px; }
.auth-success { background: var(--success-light); border: 1px solid #bbf7d0; border-radius: var(--radius); padding: 9px 12px; font-size: .8rem; color: var(--success); margin-bottom: 14px; }

/* LOADING */
#loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 14px; }
.loading-logo { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: .9rem; font-weight: 800; }
.loading-dots { display: flex; gap: 5px; }
.loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); animation: ldot 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes ldot { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

/* SIDEBAR */
#sidebar { width: 232px; min-width: 232px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
.logo { padding: 16px 14px 14px; font-weight: 700; font-size: 0.875rem; letter-spacing: -.02em; color: var(--text); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: .72rem; font-weight: 800; flex-shrink: 0; }
.sidebar-section { padding: 14px 14px 4px; font-size: 0.65rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted2); font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; margin: 1px 6px; border-radius: var(--radius); cursor: pointer; font-size: 0.825rem; color: var(--muted); font-weight: 500; transition: background .1s, color .1s; user-select: none; }
.nav-item:hover { background: var(--surface2); color: var(--text2); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.biz-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; margin: 1px 6px; border-radius: var(--radius); cursor: pointer; font-size: 0.825rem; color: var(--muted); font-weight: 500; transition: background .1s, color .1s; user-select: none; }
.biz-item:hover { background: var(--surface2); color: var(--text2); }
.biz-item { position: relative; }
.biz-edit-btn { display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted2); padding: 3px 4px; border-radius: 4px; line-height: 0; }
.biz-edit-btn:hover { color: var(--accent); background: var(--accent-light); }
.biz-item:hover .biz-edit-btn { display: flex; align-items: center; }
.biz-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.biz-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.add-btn { display: flex; align-items: center; gap: 7px; padding: 7px 10px; margin: 2px 6px; border-radius: var(--radius); cursor: pointer; font-size: 0.8rem; color: var(--muted2); font-weight: 500; border: 1.5px dashed var(--border); transition: all .12s; }
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.sidebar-footer { margin-top: auto; padding: 12px 14px; border-top: 1px solid var(--border); }
.user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-mid); display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.user-email { font-size: .72rem; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.signout-btn { font-size: .72rem; color: var(--muted2); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: all .1s; font-family: 'Inter', sans-serif; }
.signout-btn:hover { color: var(--danger); background: var(--danger-light); }

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#topbar { height: 52px; min-height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 10px; }
.topbar-title { font-weight: 600; font-size: 0.875rem; flex: 1; color: var(--text); letter-spacing: -.01em; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: var(--radius); font-size: 0.8rem; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all .1s; font-weight: 500; white-space: nowrap; letter-spacing: -.01em; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); border-color: var(--border2); }
.btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-success { background: var(--success-light); color: var(--success); border: 1px solid #bbf7d0; }
.btn-success:hover { background: #dcfce7; }
.btn-ai { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-mid); }
.btn-ai:hover { background: var(--accent-mid); }

/* CONTENT — centered */
#content { flex: 1; overflow-y: auto; padding: 28px; display: flex; justify-content: center; }
.content-inner { width: 100%; max-width: 860px; }

/* PAGE HEADER */
.page-header { margin-bottom: 22px; }
.page-header h2 { font-weight: 700; font-size: 1.1rem; margin-bottom: 3px; color: var(--text); letter-spacing: -.02em; }
.page-header p { color: var(--muted); font-size: 0.8rem; }

/* GRID + CARDS */
.grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); gap: 12px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: box-shadow .15s, border-color .15s, transform .12s; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-sm); }
.card:hover { border-color: #93c5fd; box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; letter-spacing: .03em; }
.tag-workflow { background: var(--accent-light); color: var(--accent); }
.tag-checklist { background: var(--accent3-light); color: var(--accent3); }
.tag-daily { background: var(--accent2-light); color: var(--accent2); }
.card-title { font-weight: 600; font-size: 0.875rem; color: var(--text); line-height: 1.35; letter-spacing: -.01em; }
.progress-bar { height: 3px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }
.progress-fill.done { background: var(--success); }
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
.badge-run { background: var(--success-light); color: var(--success); }
.badge-open { background: var(--accent-light); color: var(--accent); }

/* DETAIL PANEL */
.detail-panel { width: 100%; }
.detail-back { cursor: pointer; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 500; transition: color .1s; margin-bottom: 2px; }
.detail-back:hover { color: var(--accent); }
.step-list { display: flex; flex-direction: column; gap: 6px; }

/* STEP ITEMS */
.step-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; display: flex; align-items: flex-start; gap: 12px; transition: border-color .12s, background .12s; cursor: default; }
.step-item:hover { border-color: #93c5fd; }
.step-item.completed { border-color: #86efac; background: var(--success-light); }
.step-item.just-checked { animation: stepPop .28s cubic-bezier(.36,.07,.19,.97); }
@keyframes stepPop { 0%,100%{transform:scale(1)} 40%{transform:scale(1.016)} 70%{transform:scale(.996)} }

/* CHECKBOX */
.step-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .13s; margin-top: 1px; background: var(--surface); }
.step-check:hover { border-color: var(--success); background: var(--success-light); }
.step-check.checked { background: var(--success); border-color: var(--success); animation: checkBounce .22s cubic-bezier(.36,.07,.19,.97); }
@keyframes checkBounce { 0%{transform:scale(.6)} 55%{transform:scale(1.15)} 100%{transform:scale(1)} }
.step-check .check-svg { opacity: 0; transform: scale(0); transition: all .1s .04s; }
.step-check.checked .check-svg { opacity: 1; transform: scale(1); }

.step-body { flex: 1; min-width: 0; }
.step-title { font-size: 0.85rem; font-weight: 500; margin-bottom: 2px; color: var(--text); transition: color .12s; letter-spacing: -.01em; }
.step-item.completed .step-title { text-decoration: line-through; color: var(--muted2); font-weight: 400; }
.step-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.55; margin-bottom: 4px; white-space: pre-wrap; }
.step-link { display: inline-flex; align-items: center; gap: 4px; font-size: .75rem; color: var(--accent); text-decoration: none; margin-top: 3px; margin-right: 8px; font-weight: 500; }
.step-link:hover { text-decoration: underline; }
.step-img { max-width: 100%; border-radius: var(--radius); margin-top: 6px; border: 1px solid var(--border); max-height: 200px; object-fit: cover; display: block; }
.step-actions { display: flex; gap: 3px; margin-left: auto; opacity: 0; transition: opacity .1s; flex-shrink: 0; }
.step-item:hover .step-actions { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--muted2); padding: 3px; border-radius: 4px; display: flex; align-items: center; transition: all .1s; }
.icon-btn:hover { color: var(--text2); background: var(--surface3); }

/* PROGRESS BAR */
.run-progress-sticky { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 12px 0 16px; }
.run-progress-track { height: 6px; background: var(--surface3); border-radius: 6px; overflow: hidden; }
.run-progress-fill { height: 100%; border-radius: 6px; background: var(--accent); transition: width .4s cubic-bezier(.4,0,.2,1); }
.run-progress-fill.all-done { background: var(--success); }
.run-pct-label { display: flex; align-items: center; justify-content: space-between; font-size: .75rem; margin-bottom: 6px; font-weight: 500; }
.run-pct-label .pct-num { font-weight: 700; font-size: .8rem; color: var(--accent); font-variant-numeric: tabular-nums; }
.run-pct-label .step-count { color: var(--muted); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-weight: 600; font-size: 0.9rem; color: var(--text); letter-spacing: -.01em; }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; background: var(--surface2); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
label { font-size: 0.76rem; color: var(--text2); font-weight: 600; display: block; margin-bottom: 5px; }
input, textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 8px 11px; font-family: 'Inter', sans-serif; font-size: 0.82rem; outline: none; transition: border-color .1s, box-shadow .1s; resize: vertical; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
select option { background: var(--surface); }

/* subtle help text in select options */
select option .hint { color: var(--muted2); font-size: .75rem; }

.field-hint { font-size: .72rem; color: var(--muted); margin-top: 4px; }

/* AI PANEL */
.ai-panel { background: var(--accent-light); border: 1px solid var(--accent-mid); border-radius: var(--radius-lg); padding: 14px; }
.ai-panel-title { font-weight: 600; font-size: 0.82rem; color: var(--accent); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.ai-typing { display: flex; align-items: center; gap: 5px; color: var(--muted); font-size: 0.8rem; }
.ai-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; }
.ai-dot:nth-child(2) { animation-delay: .2s; }
.ai-dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }

/* TABS */
.tabs { display: flex; gap: 2px; background: var(--surface3); border-radius: var(--radius); padding: 3px; margin-bottom: 18px; }
.tab { flex: 1; text-align: center; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; color: var(--muted); transition: all .1s; font-weight: 500; }
.tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }

/* STAT CARDS */
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-sm); }
.stat-num { font-weight: 800; font-size: 1.75rem; line-height: 1; letter-spacing: -.04em; font-variant-numeric: tabular-nums; }
.stat-label { font-size: .7rem; color: var(--muted); margin-top: 4px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 2rem; margin-bottom: 12px; }
.empty h3 { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; color: var(--text2); letter-spacing: -.01em; }
.empty p { font-size: 0.8rem; line-height: 1.6; max-width: 250px; margin: 0 auto; }

/* TOAST */
.toast { position: fixed; bottom: 18px; right: 18px; background: var(--text); color: white; border-radius: var(--radius); padding: 10px 15px; z-index: 9999; font-size: 0.8rem; font-weight: 500; animation: slideIn .18s ease; box-shadow: var(--shadow-lg); }
.toast.error { background: var(--danger); }
@keyframes slideIn { from{transform:translateY(6px);opacity:0} to{transform:translateY(0);opacity:1} }

/* CHIPS */
.chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; font-size: 0.75rem; cursor: pointer; transition: all .1s; font-weight: 500; color: var(--muted); }
.chip:hover, .chip.active { background: var(--accent-light); border-color: #93c5fd; color: var(--accent); }

/* COLOR PICKER */
.color-picker-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; align-items: center; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all .12s; flex-shrink: 0; }
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px white inset; }
.color-swatch-custom { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid var(--border2); transition: all .12s; overflow: hidden; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red); }
.color-swatch-custom:hover { transform: scale(1.12); }
.color-swatch-custom.active { border-color: var(--text); box-shadow: 0 0 0 2px white inset; }
.color-swatch-custom input[type="color"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; padding: 0; border: none; }

/* IMAGE PREVIEW in modal */
.img-preview { max-width: 100%; max-height: 160px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); margin-top: 6px; display: none; }

/* TYPE SELECT — custom styled to show hint text subtly */
.type-select-wrap { position: relative; }
.type-select-wrap select { width: 100%; }
.type-hints { margin-top: 5px; display: flex; flex-direction: column; gap: 2px; }
.type-hint { font-size: .71rem; color: var(--muted2); line-height: 1.4; }
.type-hint strong { color: var(--text2); font-weight: 600; }

/* CUSTOM TYPE SELECT */
.csel { position: relative; cursor: pointer; user-select: none; }
.csel-display { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 11px; font-size: 0.82rem; transition: border-color .1s, box-shadow .1s; }
.csel:hover .csel-display { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.csel-display-label { font-weight: 500; color: var(--text); white-space: nowrap; }
.csel-arrow { margin-left: auto; color: var(--muted); flex-shrink: 0; }
.csel-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-md); z-index: 200; overflow: hidden; }
.csel-dropdown.open { display: block; }
.csel-option { display: flex; align-items: center; gap: 6px; padding: 9px 12px; cursor: pointer; transition: background .1s; }
.csel-option:hover { background: var(--surface2); }
.csel-option.selected { background: var(--accent-light); }
.csel-label { font-size: .82rem; font-weight: 500; color: var(--text); white-space: nowrap; }
.csel-hint { font-size: .76rem; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.csel-display-hint { color: var(--muted2); font-size: .76rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.divider { height: 1px; background: var(--border); margin: 4px 0; }

/* BIZ LOGO */
.biz-logo { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
.logo-upload-area { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: all .15s; margin-top: 6px; }
.logo-upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
.logo-upload-preview { width: 80px; height: 80px; border-radius: var(--radius); object-fit: cover; border: 1px solid var(--border); margin: 0 auto 8px; display: block; }
.logo-upload-hint { font-size: .75rem; color: var(--muted); }
.logo-upload-warn { font-size: .75rem; color: var(--danger); margin-top: 5px; display: none; }
.icon-tabs { display: flex; gap: 2px; background: var(--surface3); border-radius: var(--radius); padding: 3px; margin-bottom: 10px; }
.icon-tab { flex: 1; text-align: center; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: .78rem; color: var(--muted); transition: all .1s; font-weight: 500; }
.icon-tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
</style>
</head>

<script>
const SUPABASE_URL  = 'https://lybonfyrhqpmnhukqsiz.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5Ym9uZnlyaHFwbW5odWtxc2l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTUzMzYsImV4cCI6MjA4OTk5MTMzNn0.11WpPNXEgs2uWbdgSpXK9wuZHQhYES9OipoRC68ruJA';
const EDGE_FN_URL   = `${SUPABASE_URL}/functions/v1/ai-template`;

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null, activeBizId = null, currentView = 'dashboard', viewParams = {};
let pendingAITemplate = null;

const BIZ_COLORS = ['#2563eb','#059669','#d97706','#dc2626','#7c3aed','#db2777','#0891b2'];
const BIZ_EMOJIS = ['🏢','🔧','🚚','⚙️','🏗️','💼','🌿','🔩','▶️','📚','🎙️','🎵','🛒','🏠','💡','⭐'];

// ── TYPE SELECT HTML (custom dropdown with faded hint text) ───
const TYPE_OPTIONS = [
  { value:'workflow',  label:'Workflow',  hint:'e.g. launching a product, onboarding a new hire' },
  { value:'checklist', label:'Checklist', hint:'e.g. shipping an order, inspecting equipment' },
  { value:'daily',     label:'Daily',     hint:'e.g. morning routine, weekly reset' },
];
function typeSelectHTML(selected='workflow') {
  const current = TYPE_OPTIONS.find(o=>o.value===selected)||TYPE_OPTIONS[0];
  const optionsHtml = TYPE_OPTIONS.map(o=>`
    <div class="csel-option${o.value===selected?' selected':''}" data-value="${o.value}" onclick="selectType('${o.value}',this)">
      <span class="csel-label">${o.label}</span>
      <span class="csel-hint">(${o.hint})</span>
    </div>`).join('');
  return `
    <div>
      <label>Type</label>
      <input type="hidden" id="tmpl-type" value="${selected}"/>
      <div class="csel" id="csel-type" onclick="toggleCsel(event)">
        <div class="csel-display">
          <span class="csel-display-label">${current.label}</span>
          <span class="csel-display-hint">(${current.hint})</span>
          <svg class="csel-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="csel-dropdown" id="csel-dropdown">${optionsHtml}</div>
      </div>
    </div>`;
}
function toggleCsel(e) {
  const wrap = e.currentTarget;
  const dd = wrap.querySelector('.csel-dropdown');
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.csel-dropdown.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) dd.classList.add('open');
  e.stopPropagation();
}
function selectType(value, el) {
  const opt = TYPE_OPTIONS.find(o=>o.value===value);
  // update whichever hidden input is in the same csel wrapper
  const csel = el.closest('.csel');
  const hidden = csel.querySelector('input[type="hidden"]');
  if(hidden) hidden.value = value;
  const display = csel.querySelector('.csel-display');
  display.querySelector('.csel-display-label').textContent = opt.label;
  display.querySelector('.csel-display-hint').textContent = '('+opt.hint+')';
  csel.querySelectorAll('.csel-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  csel.querySelector('.csel-dropdown').classList.remove('open');
}
document.addEventListener('click', ()=>document.querySelectorAll('.csel-dropdown.open').forEach(d=>d.classList.remove('open')));

// ── HELPERS ───────────────────────────────────────────────────
function setContent(html) {
  document.getElementById('content').innerHTML = `<div class="content-inner">${html}</div>`;
}
function toast(msg, type='success') {
  const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}
function show(id){document.getElementById(id).style.display='flex';}
function hide(id){document.getElementById(id).style.display='none';}
function iconEdit(){return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;}
function iconTrash(){return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;}
function iconUp(){return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>`;}
function iconDown(){return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;}
function iconLink(){return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;}

// ── BOOT ─────────────────────────────────────────────────────
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  hide('loading-screen');
  if (session) { currentUser = session.user; showApp(); }
  else { show('auth-screen'); }
  sb.auth.onAuthStateChange((_e, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { currentUser = null; showAuthScreen(); }
  });
}
function showApp() {
  hide('auth-screen');
  const app=document.getElementById('app'); app.style.display='flex';
  const emailEl=document.getElementById('user-email'), avatarEl=document.getElementById('user-avatar');
  if(emailEl) emailEl.textContent=currentUser.email;
  if(avatarEl) avatarEl.textContent=(currentUser.email||'?')[0].toUpperCase();
  renderSidebar(); renderMain();
}
function showAuthScreen(){document.getElementById('app').style.display='none'; show('auth-screen');}

// ── AUTH ─────────────────────────────────────────────────────
let authMode='signin';
function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-signin').classList.toggle('active',mode==='signin');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('auth-submit-btn').textContent=mode==='signin'?'Sign In':'Create Account';
  document.getElementById('auth-message').innerHTML='';
}
async function submitAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const btn=document.getElementById('auth-submit-btn');
  if(!email||!password){showAuthMsg('Please enter your email and password.','error');return;}
  btn.disabled=true;
  btn.textContent=authMode==='signin'?'Signing in…':'Creating account…';
  document.getElementById('auth-message').innerHTML='';
  if(authMode==='signin'){
    const{error}=await sb.auth.signInWithPassword({email,password});
    if(error){showAuthMsg(error.message,'error');btn.disabled=false;btn.textContent='Sign In';}
  } else {
    const{error}=await sb.auth.signUp({email,password});
    if(error){showAuthMsg(error.message,'error');btn.disabled=false;btn.textContent='Create Account';}
    else{showAuthMsg('Account created! Check your email to confirm, then sign in.','success');switchAuthTab('signin');btn.disabled=false;}
  }
}
function showAuthMsg(msg,type){document.getElementById('auth-message').innerHTML=`<div class="auth-${type}">${msg}</div>`;}
async function signOut(){await sb.auth.signOut();activeBizId=null;currentView='dashboard';}

// ── DB ────────────────────────────────────────────────────────
async function dbGet(table,extraQuery){
  let q=sb.from(table).select('*').eq('user_id',currentUser.id).order('created_at',{ascending:true});
  if(extraQuery) q=extraQuery(q);
  const{data,error}=await q;
  if(error){toast('Error loading: '+error.message,'error');return[];}
  return data||[];
}
async function dbInsert(table,row){
  const{data,error}=await sb.from(table).insert({...row,user_id:currentUser.id}).select().single();
  if(error){toast('Error saving: '+error.message,'error');return null;}
  return data;
}
async function dbUpdate(table,id,updates){
  const{error}=await sb.from(table).update(updates).eq('id',id).eq('user_id',currentUser.id);
  if(error) toast('Error updating: '+error.message,'error');
}
async function dbDelete(table,id){
  const{error}=await sb.from(table).delete().eq('id',id).eq('user_id',currentUser.id);
  if(error) toast('Error deleting: '+error.message,'error');
}

// ── SIDEBAR ───────────────────────────────────────────────────
async function renderSidebar(){
  const businesses=await dbGet('businesses');
  if(!activeBizId&&businesses.length>0) activeBizId=businesses[0].id;
  const list=document.getElementById('biz-list'); if(!list) return;
  list.innerHTML='';
  businesses.forEach(b=>{
    const el=document.createElement('div');
    el.className='biz-item'+(activeBizId===b.id?' active':'');
    const bizIcon = b.logoData ? `<img class="biz-logo" src="${b.logoData}" alt=""/>` : `<span>${b.emoji||'🏢'}</span>`;
    el.innerHTML=`<div class="biz-dot" style="background:${b.color}"></div>${bizIcon} <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${b.name}</span><button class="biz-edit-btn" title="Edit business" onclick="event.stopPropagation();openModal('editBiz','${b.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`;
    el.onclick=()=>{activeBizId=b.id;renderSidebar();renderMain();};
    list.appendChild(el);
  });
}

// ── NAVIGATION ────────────────────────────────────────────────
function navigate(view,params={}){
  currentView=view; viewParams=params;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+view.split('-')[0]);
  if(el) el.classList.add('active');
  renderMain();
}
function renderMain(){
  ({dashboard:renderDashboard,templates:renderTemplates,runs:renderRuns,'template-detail':renderTemplateDetail,'run-detail':renderRunDetail}[currentView]||renderDashboard)();
}
function setTopbar(title,actions){
  document.getElementById('topbar-title').textContent=title;
  document.getElementById('topbar-actions').innerHTML=actions;
}

// ── DASHBOARD ─────────────────────────────────────────────────
async function renderDashboard(){
  setTopbar('Loading…','');
  const[businesses,templates,runs]=await Promise.all([
    dbGet('businesses'),
    activeBizId?dbGet('templates',q=>q.eq('biz_id',activeBizId)):Promise.resolve([]),
    activeBizId?dbGet('runs',q=>q.eq('biz_id',activeBizId)):Promise.resolve([]),
  ]);
  const biz=businesses.find(b=>b.id===activeBizId);
  const topbarIcon = biz ? (biz.logoData ? `<img style='width:16px;height:16px;border-radius:3px;object-fit:cover;vertical-align:middle;margin-right:3px;' src='${biz.logoData}'/>` : `${biz.emoji||'🏢'} `) : '';
  setTopbar(biz?`${topbarIcon}${biz.name}`:'Dashboard',`
    <button class="btn btn-ai" onclick="openAIModal()">✦ Ask AI to Build</button>
    <button class="btn btn-primary" onclick="openModal('newTemplate')">+ New Template</button>
  `);
  if(!biz){setContent(`<div class="empty"><div class="empty-icon">🏢</div><h3>No business selected</h3><p>Add a business from the sidebar.</p></div>`);return;}
  const activeRuns=runs.filter(r=>r.status!=='done'),doneRuns=runs.filter(r=>r.status==='done');
  const bizIconHtml = biz.logoData ? `<img style='width:22px;height:22px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-right:4px;' src='${biz.logoData}'/>` : `${biz.emoji||'🏢'} `;
  let html=`<div class="page-header"><h2>${bizIconHtml}${biz.name}</h2><p>${templates.length} templates &bull; ${activeRuns.length} active runs</p></div>`;
  html+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;">${statCard('Templates',templates.length,'var(--accent)')}${statCard('Active Runs',activeRuns.length,'var(--accent2)')}${statCard('Completed',doneRuns.length,'var(--success)')}</div>`;
  if(templates.length){
    html+=`<div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;"><span style="font-weight:600;font-size:.8rem;color:var(--text2);">Templates</span><button class="btn btn-ghost" style="font-size:.75rem;padding:4px 10px;" onclick="navigate('templates')">View all</button></div>`;
    html+=`<div class="grid-3">${templates.slice(0,6).map(t=>templateCard(t,runs)).join('')}</div>`;
  } else {
    html+=`<div class="empty"><div class="empty-icon">📋</div><h3>No templates yet</h3><p>Create a template or ask AI to build one.</p><div style="margin-top:14px;display:flex;gap:8px;justify-content:center;"><button class="btn btn-ai" onclick="openAIModal()">✦ Ask AI</button><button class="btn btn-primary" onclick="openModal('newTemplate')">+ New Template</button></div></div>`;
  }
  if(activeRuns.length){
    html+=`<div style="margin:24px 0 10px;display:flex;align-items:center;justify-content:space-between;"><span style="font-weight:600;font-size:.8rem;color:var(--text2);">Active Runs</span><button class="btn btn-ghost" style="font-size:.75rem;padding:4px 10px;" onclick="navigate('runs')">View all</button></div>`;
    html+=`<div class="grid-3">${activeRuns.slice(0,3).map(r=>runCard(r,templates)).join('')}</div>`;
  }
  setContent(html);
}

function statCard(label,val,color){return `<div class="stat-card"><div class="stat-num" style="color:${color}">${val}</div><div class="stat-label">${label}</div></div>`;}

function templateCard(t,runs=[]){
  const active=runs.filter(r=>r.template_id===t.id&&r.status!=='done').length;
  const tag={workflow:'tag-workflow',daily:'tag-daily',checklist:'tag-checklist'}[t.type]||'tag-workflow';
  const label={workflow:'Workflow',daily:'Daily',checklist:'Checklist'}[t.type]||t.type;
  return `<div class="card" onclick="navigate('template-detail',{id:'${t.id}'})">
    <div style="display:flex;align-items:center;justify-content:space-between;"><span class="card-tag ${tag}">${label}</span><span style="font-size:.72rem;color:var(--muted);">${(t.steps||[]).length} steps</span></div>
    <div class="card-title">${t.name}</div>
    ${t.description?`<div style="font-size:.77rem;color:var(--muted);line-height:1.45;">${t.description}</div>`:''}
    <div style="display:flex;gap:6px;margin-top:2px;">
      <button class="btn btn-success" style="flex:1;font-size:.75rem;padding:5px;" onclick="event.stopPropagation();startRun('${t.id}')">▶ Start Run</button>
      <button class="btn btn-ghost" style="font-size:.75rem;padding:5px 10px;" onclick="event.stopPropagation();navigate('template-detail',{id:'${t.id}'})">Edit</button>
    </div>
    ${active?`<div style="font-size:.72rem;color:var(--accent2);font-weight:500;">● ${active} active run${active>1?'s':''}</div>`:''}
  </div>`;
}

function runCard(r,templates=[]){
  const tpl=templates.find(t=>t.id===r.template_id);
  const steps=r.steps||[],done=steps.filter(s=>s.checked).length,total=steps.length;
  const pct=total?Math.round(done/total*100):0;
  return `<div class="card" onclick="navigate('run-detail',{id:'${r.id}'})">
    <div style="display:flex;align-items:center;justify-content:space-between;"><span class="badge badge-open">In Progress</span><span style="font-size:.72rem;color:var(--muted);">${done}/${total}</span></div>
    <div class="card-title">${r.name}</div>
    ${tpl?`<div style="font-size:.72rem;color:var(--muted);">from: ${tpl.name}</div>`:''}
    <div class="progress-bar"><div class="progress-fill${pct===100?' done':''}" style="width:${pct}%"></div></div>
    <div style="font-size:.72rem;color:var(--muted);">${pct}% complete</div>
  </div>`;
}

// ── TEMPLATES ─────────────────────────────────────────────────
async function renderTemplates(){
  setTopbar('Templates',`<button class="btn btn-ai" onclick="openAIModal()">✦ Ask AI to Build</button><button class="btn btn-primary" onclick="openModal('newTemplate')">+ New Template</button>`);
  const[templates,runs]=await Promise.all([
    activeBizId?dbGet('templates',q=>q.eq('biz_id',activeBizId)):Promise.resolve([]),
    activeBizId?dbGet('runs',q=>q.eq('biz_id',activeBizId)):Promise.resolve([]),
  ]);
  let html=`<div class="page-header"><h2>Templates</h2><p>Reusable checklists and workflow blueprints.</p></div>`;
  html+=templates.length?`<div class="grid-3">${templates.map(t=>templateCard(t,runs)).join('')}</div>`
    :`<div class="empty"><div class="empty-icon">📋</div><h3>No templates yet</h3><p>Create your first or ask AI to generate one.</p><div style="margin-top:14px;display:flex;gap:8px;justify-content:center;"><button class="btn btn-ai" onclick="openAIModal()">✦ Ask AI</button><button class="btn btn-primary" onclick="openModal('newTemplate')">+ New Template</button></div></div>`;
  setContent(html);
}

// ── RUNS ──────────────────────────────────────────────────────
async function renderRuns(){
  setTopbar('Active Runs','');
  const[runs,templates]=await Promise.all([
    activeBizId?dbGet('runs',q=>q.eq('biz_id',activeBizId)):Promise.resolve([]),
    activeBizId?dbGet('templates',q=>q.eq('biz_id',activeBizId)):Promise.resolve([]),
  ]);
  const active=runs.filter(r=>r.status!=='done'),done=runs.filter(r=>r.status==='done');
  let html=`<div class="page-header"><h2>Runs</h2><p>Active checklist and workflow instances.</p></div>`;
  html+=`<div class="tabs"><div class="tab active" id="tab-active" onclick="switchRunTab('active')">Active (${active.length})</div><div class="tab" id="tab-done" onclick="switchRunTab('done')">Completed (${done.length})</div></div>`;
  html+=`<div id="run-tab-content">${renderRunList(active,templates,'No active runs.')}</div>`;
  setContent(html);
  document.getElementById('content')._runData={runs,templates};
}
function renderRunList(runs,templates,emptyMsg){
  if(!runs.length) return `<div class="empty"><div class="empty-icon">🕐</div><h3>${emptyMsg}</h3><p>Start a template run from Templates.</p></div>`;
  return `<div class="grid-3">${runs.map(r=>runCard(r,templates)).join('')}</div>`;
}
function switchRunTab(which){
  const data=document.getElementById('content')._runData||{runs:[],templates:[]};
  document.getElementById('tab-active').classList.toggle('active',which==='active');
  document.getElementById('tab-done').classList.toggle('active',which==='done');
  const list=which==='done'?data.runs.filter(r=>r.status==='done'):data.runs.filter(r=>r.status!=='done');
  document.getElementById('run-tab-content').innerHTML=renderRunList(list,data.templates,which==='done'?'No completed runs.':'No active runs.');
}

// ── STEP EXTRAS ───────────────────────────────────────────────
function renderStepExtras(step){
  let html='';
  if(step.desc) html+=`<div class="step-desc">${step.desc}</div>`;
  if(step.links&&step.links.length) step.links.forEach(l=>{if(l.url) html+=`<a class="step-link" href="${l.url}" target="_blank" rel="noopener">${iconLink()} ${l.label||l.url}</a>`;});
  if(step.imageUrl) html+=`<img class="step-img" src="${step.imageUrl}" alt="Step image" onerror="this.style.display='none'"/>`;
  return html;
}

// ── TEMPLATE DETAIL ───────────────────────────────────────────
async function renderTemplateDetail(){
  setTopbar('Loading…','');
  const{data:t}=await sb.from('templates').select('*').eq('id',viewParams.id).single();
  if(!t){navigate('templates');return;}
  const tag={workflow:'tag-workflow',daily:'tag-daily',checklist:'tag-checklist'}[t.type]||'tag-workflow';
  const steps=t.steps||[];
  setTopbar(t.name,`
    <button class="btn btn-ghost" onclick="openModal('editTemplate','${t.id}')">Edit Info</button>
    <button class="btn btn-danger" onclick="deleteTemplate('${t.id}')">Delete</button>
    <button class="btn btn-success" onclick="startRun('${t.id}')">▶ Start Run</button>
  `);
  let html=`<div class="detail-panel">
    <div class="detail-back" onclick="navigate('templates')">← Back to Templates</div>
    <div style="margin:12px 0 5px;display:flex;align-items:center;gap:8px;"><span class="card-tag ${tag}">${t.type}</span><span style="font-size:.75rem;color:var(--muted);">${steps.length} steps</span></div>
    ${t.description?`<div style="font-size:.8rem;color:var(--muted);margin-bottom:16px;line-height:1.5;">${t.description}</div>`:'<div style="margin-bottom:16px;"></div>'}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-weight:600;font-size:.82rem;color:var(--text);">Steps</span>
      <button class="btn btn-primary" style="font-size:.75rem;padding:5px 11px;" onclick="openModal('addStep','${t.id}')">+ Add Step</button>
    </div>
    <div class="step-list">`;
  steps.forEach((step,i)=>{
    const isFirst=i===0,isLast=i===steps.length-1;
    html+=`<div class="step-item">
      <div style="display:flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--accent-light);border-radius:50%;font-size:.68rem;font-weight:700;flex-shrink:0;color:var(--accent);">${i+1}</div>
      <div class="step-body">
        <div class="step-title">${step.title}</div>
        ${renderStepExtras(step)}
      </div>
      <div class="step-actions">
        ${!isFirst?`<button class="icon-btn" title="Move up" onclick="moveStep('${t.id}',${i},-1)">${iconUp()}</button>`:''}
        ${!isLast?`<button class="icon-btn" title="Move down" onclick="moveStep('${t.id}',${i},1)">${iconDown()}</button>`:''}
        <button class="icon-btn" title="Edit" onclick="openModal('editStep','${t.id}',${i})">${iconEdit()}</button>
        <button class="icon-btn" title="Delete" onclick="deleteStep('${t.id}',${i})" style="color:var(--danger);">${iconTrash()}</button>
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  setContent(html);
}

// ── RUN DETAIL ────────────────────────────────────────────────
async function renderRunDetail(){
  setTopbar('Loading…','');
  const{data:run}=await sb.from('runs').select('*').eq('id',viewParams.id).single();
  if(!run){navigate('runs');return;}
  const steps=run.steps||[],done=steps.filter(s=>s.checked).length,total=steps.length;
  const pct=total?Math.round(done/total*100):0,isDone=run.status==='done';
  setTopbar(run.name,`
    ${!isDone?`<button class="btn btn-success" onclick="completeRun('${run.id}')">✓ Mark Complete</button>`:''}
    <button class="btn btn-danger" onclick="deleteRun('${run.id}')">Delete</button>
  `);
  let html=`<div class="detail-panel">
    <div class="detail-back" onclick="navigate('runs')">← Back to Runs</div>
    <div class="run-progress-sticky">
      <div class="run-pct-label"><span class="step-count">${done} of ${total} steps complete</span><span class="pct-num">${pct}%</span></div>
      <div class="run-progress-track"><div class="run-progress-fill${pct===100?' all-done':''}" id="run-prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="step-list">`;
  steps.forEach((step,i)=>{
    html+=`<div class="step-item${step.checked?' completed':''}" id="rs-${i}">
      <div class="step-check${step.checked?' checked':''}" onclick="toggleStep('${run.id}',${i})">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="step-body">
        <div class="step-title">${step.title}</div>
        ${renderStepExtras(step)}
      </div>
    </div>`;
  });
  html+=`</div>${isDone?`<div style="text-align:center;padding:28px 0 8px;"><div style="font-size:1.4rem;">🎉</div><div style="font-weight:600;font-size:.9rem;margin-top:7px;color:var(--text);">All done!</div><div style="font-size:.78rem;color:var(--muted);margin-top:3px;">This run is complete.</div></div>`:''}</div>`;
  setContent(html);
  document.getElementById('content')._runSteps=steps;
}

// ── ACTIONS ───────────────────────────────────────────────────
async function startRun(templateId){
  const{data:t}=await sb.from('templates').select('*').eq('id',templateId).single(); if(!t) return;
  const steps=(t.steps||[]).map(s=>({...s,checked:false}));
  const run=await dbInsert('runs',{template_id:templateId,biz_id:t.biz_id,name:t.name+' — '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),steps,status:'active'});
  if(run){toast('Run started!');navigate('run-detail',{id:run.id});}
}
async function moveStep(templateId,index,direction){
  const{data:t}=await sb.from('templates').select('*').eq('id',templateId).single(); if(!t) return;
  const steps=[...(t.steps||[])];
  const newIndex=index+direction;
  if(newIndex<0||newIndex>=steps.length) return;
  [steps[index],steps[newIndex]]=[steps[newIndex],steps[index]];
  await dbUpdate('templates',templateId,{steps});
  renderTemplateDetail();
}
async function toggleStep(runId,stepIndex){
  const steps=[...(document.getElementById('content')._runSteps||[])];
  const wasChecked=steps[stepIndex].checked;
  steps[stepIndex].checked=!wasChecked;
  const allDone=steps.every(s=>s.checked);
  await dbUpdate('runs',runId,{steps,...(allDone?{status:'done'}:{})});
  document.getElementById('content')._runSteps=steps;
  if(!wasChecked) playDing();
  const itemEl=document.getElementById('rs-'+stepIndex);
  if(itemEl){
    const checkEl=itemEl.querySelector('.step-check');
    if(!wasChecked){checkEl.classList.add('checked');itemEl.classList.add('completed','just-checked');setTimeout(()=>itemEl.classList.remove('just-checked'),350);}
    else{checkEl.classList.remove('checked');itemEl.classList.remove('completed');}
  }
  const d=steps.filter(s=>s.checked).length,tot=steps.length,pct=tot?Math.round(d/tot*100):0;
  const fill=document.getElementById('run-prog-fill');
  if(fill){fill.style.width=pct+'%';fill.classList.toggle('all-done',pct===100);}
  const pn=document.querySelector('.pct-num'),sc=document.querySelector('.step-count');
  if(pn) pn.textContent=pct+'%'; if(sc) sc.textContent=`${d} of ${tot} steps complete`;
  if(allDone&&!wasChecked) setTimeout(()=>launchConfetti(),250);
}
async function completeRun(runId){
  const steps=(document.getElementById('content')._runSteps||[]).map(s=>({...s,checked:true}));
  await dbUpdate('runs',runId,{status:'done',steps});
  toast('Run complete! 🎉'); launchConfetti(); setTimeout(()=>navigate('runs'),1800);
}
async function deleteRun(runId){if(!confirm('Delete this run?'))return;await dbDelete('runs',runId);toast('Run deleted.');navigate('runs');}
async function deleteTemplate(id){if(!confirm('Delete this template?'))return;await dbDelete('templates',id);toast('Template deleted.');navigate('templates');}
async function deleteStep(templateId,stepIndex){
  const{data:t}=await sb.from('templates').select('*').eq('id',templateId).single(); if(!t) return;
  const steps=[...(t.steps||[])]; steps.splice(stepIndex,1);
  await dbUpdate('templates',templateId,{steps}); renderTemplateDetail();
}

// ── COLOR PICKER ──────────────────────────────────────────────
function buildColorPicker(currentColor){
  const swatches=BIZ_COLORS.map(c=>`<div class="color-swatch${c===currentColor?' active':''}" style="background:${c};" onclick="selectBizColor('${c}',this)" title="${c}"></div>`).join('');
  const customActive=!BIZ_COLORS.includes(currentColor);
  return `<div class="color-picker-row">${swatches}
    <div class="color-swatch-custom${customActive?' active':''}" title="Custom color" onclick="this.querySelector('input').click()">
      <input type="color" id="custom-color-input" value="${customActive?currentColor:'#10b981'}" oninput="selectBizColor(this.value,this.parentNode)" onchange="selectBizColor(this.value,this.parentNode)"/>
    </div>
  </div>
  <input type="hidden" id="biz-color" value="${currentColor||BIZ_COLORS[0]}"/>`;
}
function selectBizColor(color,el){
  document.getElementById('biz-color').value=color;
  document.querySelectorAll('.color-swatch,.color-swatch-custom').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
}

// ── STEP MODAL BUILDER ────────────────────────────────────────
function buildStepModalBody(step={}){
  const links=step.links||[];
  const linksHtml=links.map((l,i)=>`
    <div style="display:flex;gap:6px;margin-bottom:6px;" id="link-row-${i}">
      <input placeholder="Label (e.g. Google Drive)" value="${l.label||''}" id="link-label-${i}" style="flex:1;"/>
      <input placeholder="https://..." value="${l.url||''}" id="link-url-${i}" style="flex:2;"/>
      <button class="btn btn-danger" style="padding:5px 8px;font-size:.75rem;" onclick="removeLinkRow(${i})">✕</button>
    </div>`).join('');
  return `
    <div><label>Step Title</label><input id="step-title" value="${step.title||''}" placeholder="What needs to be done?"/></div>
    <div><label>Notes (optional)</label><textarea id="step-desc" rows="3" placeholder="Instructions, context, details...">${step.desc||''}</textarea></div>
    <div>
      <label>Links (optional)</label>
      <div id="link-rows">${linksHtml}</div>
      <button class="btn btn-ghost" style="font-size:.75rem;padding:5px 10px;margin-top:4px;" onclick="addLinkRow()">+ Add Link</button>
    </div>
    <div>
      <label>Image URL (optional)</label>
      <input id="step-image-url" value="${step.imageUrl||''}" placeholder="https://... (paste any image URL)"/>
      <div class="field-hint">Paste a direct link to an image (jpg, png, gif, etc.)</div>
      ${step.imageUrl?`<img class="img-preview" src="${step.imageUrl}" style="display:block;" onerror="this.style.display='none'"/>`:'<img class="img-preview" id="img-preview-el"/>'}
    </div>`;
}

let linkRowCount=0;
function addLinkRow(){
  const container=document.getElementById('link-rows');
  const i=linkRowCount++;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:6px;margin-bottom:6px;';
  div.id=`link-row-${i}`;
  div.innerHTML=`<input placeholder="Label (e.g. Google Drive)" id="link-label-${i}" style="flex:1;"/><input placeholder="https://..." id="link-url-${i}" style="flex:2;"/><button class="btn btn-danger" style="padding:5px 8px;font-size:.75rem;" onclick="removeLinkRow(${i})">✕</button>`;
  container.appendChild(div);
}
function removeLinkRow(i){const el=document.getElementById('link-row-'+i);if(el)el.remove();}
function collectLinks(){
  const rows=document.querySelectorAll('#link-rows > div[id^="link-row-"]');
  return Array.from(rows).map(row=>{
    const idx=row.id.replace('link-row-','');
    const label=(document.getElementById('link-label-'+idx)||{}).value||'';
    const url=(document.getElementById('link-url-'+idx)||{}).value||'';
    return{label,url};
  }).filter(l=>l.url.trim());
}
document.addEventListener('input',e=>{
  if(e.target&&e.target.id==='step-image-url'){
    const prev=document.querySelector('.img-preview');
    if(prev){prev.src=e.target.value;prev.style.display=e.target.value?'block':'none';}
  }
});

// ── ICON PICKER (emoji + logo upload) ────────────────────────
function buildIconPicker(currentEmoji, currentLogo) {
  const emojis = BIZ_EMOJIS.map(e => {
    const isActive = (!currentLogo && e===currentEmoji) ? ' active' : '';
    return `<div class="chip${isActive}" onclick="selectBizEmoji('${e}',this)">${e}</div>`;
  }).join('');
  const hasLogo = currentLogo ? true : false;
  return `
    <input type="hidden" id="biz-emoji" value="${currentEmoji||'🏢'}"/>
    <input type="hidden" id="biz-logo-data" value="${currentLogo||''}"/>
    <div class="icon-tabs">
      <div class="icon-tab${!hasLogo?' active':''}" id="itab-emoji" onclick="switchIconTab('emoji')">Emoji</div>
      <div class="icon-tab${hasLogo?' active':''}" id="itab-logo" onclick="switchIconTab('logo')">Upload Logo</div>
    </div>
    <div id="icon-panel-emoji" style="display:${hasLogo?'none':'block'}">
      <div class="chip-row">${emojis}</div>
    </div>
    <div id="icon-panel-logo" style="display:${hasLogo?'block':'none'}">
      ${currentLogo ? `<img class="logo-upload-preview" src="${currentLogo}" id="logo-preview"/>` : `<img class="logo-upload-preview" id="logo-preview" style="display:none"/>`}
      <div class="logo-upload-area" onclick="document.getElementById('logo-file-input').click()">
        <div class="logo-upload-hint">Click to upload logo<br/><span style="color:var(--muted2);font-size:.7rem;">Max 200×200px · Square (1:1) · PNG or JPG</span></div>
      </div>
      <input type="file" id="logo-file-input" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none" onchange="handleLogoUpload(this)"/>
      <div class="logo-upload-warn" id="logo-warn">⚠ Image is larger than 200×200px. Please use a smaller image.</div>
      ${currentLogo ? `<button class="btn btn-ghost" style="font-size:.75rem;margin-top:8px;width:100%;" onclick="clearBizLogo()">Remove logo</button>` : ''}
    </div>`;
}
function switchIconTab(tab) {
  document.getElementById('itab-emoji').classList.toggle('active', tab==='emoji');
  document.getElementById('itab-logo').classList.toggle('active', tab==='logo');
  document.getElementById('icon-panel-emoji').style.display = tab==='emoji' ? 'block' : 'none';
  document.getElementById('icon-panel-logo').style.display = tab==='logo' ? 'block' : 'none';
}
function selectBizEmoji(e, el) {
  document.getElementById('biz-emoji').value = e;
  document.getElementById('biz-logo-data').value = '';
  document.querySelectorAll('#icon-panel-emoji .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}
function handleLogoUpload(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const warn = document.getElementById('logo-warn');
      if(img.width > 200 || img.height > 200) {
        warn.style.display = 'block';
        input.value = '';
        return;
      }
      warn.style.display = 'none';
      document.getElementById('biz-logo-data').value = e.target.result;
      document.getElementById('biz-emoji').value = '';
      const preview = document.getElementById('logo-preview');
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearBizLogo() {
  document.getElementById('biz-logo-data').value = '';
  const preview = document.getElementById('logo-preview');
  if(preview) { preview.src=''; preview.style.display='none'; }
}

// ── MODALS ────────────────────────────────────────────────────
async function openModal(type,...args){
  document.getElementById('modal-overlay').style.display='flex';
  linkRowCount=0;
  const businesses=await dbGet('businesses');

  if(type==='newBiz'){
    document.getElementById('modal-title').textContent='Add Business';
    document.getElementById('modal-body').innerHTML=`
      <div><label>Business Name</label><input id="biz-name" placeholder="e.g. Yonder Audiobooks"/></div>
      <div><label>Color</label>${buildColorPicker(BIZ_COLORS[0])}</div>
      <div><label>Icon</label>${buildIconPicker('🏢', null)}</div>`;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBiz()">Add Business</button>`;

  } else if(type==='editBiz'){
    const biz=businesses.find(b=>b.id===args[0]); if(!biz) return;
    document.getElementById('modal-title').textContent='Edit Business';
    document.getElementById('modal-body').innerHTML=`
      <div><label>Business Name</label><input id="biz-name" value="${biz.name}"/></div>
      <div><label>Color</label>${buildColorPicker(biz.color||BIZ_COLORS[0])}</div>
      <div><label>Icon</label>${buildIconPicker(biz.emoji||'🏢', biz.logoData||null)}</div>`;
    document.getElementById('modal-footer').innerHTML=`
      <button class="btn btn-danger" onclick="deleteBiz('${biz.id}')">Delete</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateBiz('${biz.id}')">Save</button>`;

  } else if(type==='newTemplate'){
    document.getElementById('modal-title').textContent='New Template';
    const bOpts=businesses.map(b=>`<option value="${b.id}" ${b.id===activeBizId?'selected':''}>${b.emoji||'🏢'} ${b.name}</option>`).join('');
    document.getElementById('modal-body').innerHTML=`
      <div><label>Template Name</label><input id="tmpl-name" placeholder="e.g. Monthly Invoice Process"/></div>
      ${typeSelectHTML('workflow')}
      <div><label>Description (optional)</label><textarea id="tmpl-desc" rows="2" placeholder="What is this process for?"></textarea></div>
      <div><label>Business</label><select id="tmpl-biz">${bOpts}</select></div>`;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTemplate()">Create</button>`;

  } else if(type==='editTemplate'){
    const{data:t}=await sb.from('templates').select('*').eq('id',args[0]).single(); if(!t) return;
    document.getElementById('modal-title').textContent='Edit Template';
    document.getElementById('modal-body').innerHTML=`
      <div><label>Name</label><input id="tmpl-name" value="${t.name}"/></div>
      ${typeSelectHTML(t.type)}
      <div><label>Description</label><textarea id="tmpl-desc" rows="2">${t.description||''}</textarea></div>`;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateTemplate('${t.id}')">Save</button>`;

  } else if(type==='addStep'){
    document.getElementById('modal-title').textContent='Add Step';
    document.getElementById('modal-body').innerHTML=buildStepModalBody();
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveStep('${args[0]}')">Add Step</button>`;

  } else if(type==='editStep'){
    const{data:t}=await sb.from('templates').select('*').eq('id',args[0]).single();
    const step=(t?.steps||[])[args[1]]; if(!step) return;
    linkRowCount=(step.links||[]).length;
    document.getElementById('modal-title').textContent='Edit Step';
    document.getElementById('modal-body').innerHTML=buildStepModalBody(step);
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateStep('${args[0]}',${args[1]})">Save</button>`;
  }
}

async function saveBiz(){
  const name=document.getElementById('biz-name').value.trim(); if(!name){alert('Enter a name.');return;}
  const logoData=document.getElementById('biz-logo-data')?document.getElementById('biz-logo-data').value:'';
  const emoji=document.getElementById('biz-emoji')?document.getElementById('biz-emoji').value:'🏢';
  const biz=await dbInsert('businesses',{name,color:document.getElementById('biz-color').value,emoji,logoData:logoData||null});
  if(biz){activeBizId=biz.id;closeModal();toast('Business added!');renderSidebar();navigate('dashboard');}
}
async function updateBiz(id){
  const name=document.getElementById('biz-name').value.trim(); if(!name){alert('Enter a name.');return;}
  const logoData=document.getElementById('biz-logo-data')?document.getElementById('biz-logo-data').value:'';
  const emoji=document.getElementById('biz-emoji')?document.getElementById('biz-emoji').value:'🏢';
  await dbUpdate('businesses',id,{name,color:document.getElementById('biz-color').value,emoji,logoData:logoData||null});
  closeModal();toast('Business updated!');renderSidebar();renderMain();
}
async function deleteBiz(id){
  if(!confirm('Delete this business? All its templates and runs will also be deleted.'))return;
  // delete runs and templates first
  const templates=await dbGet('templates',q=>q.eq('biz_id',id));
  for(const t of templates){
    await dbDelete('runs_by_template',t.id).catch(()=>{});
    await dbDelete('templates',t.id);
  }
  const runs=await dbGet('runs',q=>q.eq('biz_id',id));
  for(const r of runs) await dbDelete('runs',r.id);
  await dbDelete('businesses',id);
  if(activeBizId===id) activeBizId=null;
  closeModal();toast('Business deleted.');renderSidebar();navigate('dashboard');
}
async function saveTemplate(){
  const name=document.getElementById('tmpl-name').value.trim(); if(!name){alert('Enter a name.');return;}
  const t=await dbInsert('templates',{biz_id:document.getElementById('tmpl-biz').value,name,type:document.getElementById('tmpl-type').value,description:document.getElementById('tmpl-desc').value.trim(),steps:[]});
  if(t){closeModal();toast('Template created!');navigate('template-detail',{id:t.id});}
}
async function updateTemplate(id){
  await dbUpdate('templates',id,{name:document.getElementById('tmpl-name').value.trim(),type:document.getElementById('tmpl-type').value,description:document.getElementById('tmpl-desc').value.trim()});
  closeModal();toast('Saved!');renderTemplateDetail();
}
async function saveStep(templateId){
  const title=document.getElementById('step-title').value.trim(); if(!title){alert('Enter a title.');return;}
  const{data:t}=await sb.from('templates').select('*').eq('id',templateId).single();
  const newStep={title,desc:document.getElementById('step-desc').value.trim(),links:collectLinks(),imageUrl:document.getElementById('step-image-url').value.trim()};
  const steps=[...(t?.steps||[]),newStep];
  await dbUpdate('templates',templateId,{steps}); closeModal(); renderTemplateDetail();
}
async function updateStep(templateId,stepIndex){
  const{data:t}=await sb.from('templates').select('*').eq('id',templateId).single();
  const steps=[...(t?.steps||[])];
  steps[stepIndex]={...steps[stepIndex],title:document.getElementById('step-title').value.trim()||steps[stepIndex].title,desc:document.getElementById('step-desc').value.trim(),links:collectLinks(),imageUrl:document.getElementById('step-image-url').value.trim()};
  await dbUpdate('templates',templateId,{steps}); closeModal(); renderTemplateDetail();
}
function closeModal(){document.getElementById('modal-overlay').style.display='none';linkRowCount=0;}
function closeModalOnOverlay(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ── AI MODAL ──────────────────────────────────────────────────
async function openAIModal(){
  pendingAITemplate=null;
  document.getElementById('modal-overlay').style.display='flex';
  document.getElementById('modal-title').textContent='✦ Ask AI to Build a Template';
  const businesses=await dbGet('businesses');
  const bOpts=businesses.map(b=>`<option value="${b.id}" ${b.id===activeBizId?'selected':''}>${b.emoji||'🏢'} ${b.name}</option>`).join('');
  const aiTypeHtml = typeSelectHTML('checklist').replace('id="tmpl-type"','id="ai-type"');
  document.getElementById('modal-body').innerHTML=`
    <div class="ai-panel"><div class="ai-panel-title">✦ Describe your process</div><div style="font-size:.77rem;color:var(--muted);line-height:1.5;">Tell me what checklist or workflow you need and I'll build it for you.</div></div>
    <div><label>What do you need?</label><textarea id="ai-prompt" rows="4" placeholder="e.g. 'Weekly truck maintenance checklist for our oilfield fleet'"></textarea></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>${aiTypeHtml}</div>
      <div><label>Business</label><select id="ai-biz">${bOpts}</select></div>
    </div>
    <div id="ai-result"></div>`;
  document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-ai" onclick="runAI()">✦ Generate</button>`;
}

async function runAI(){
  const prompt=document.getElementById('ai-prompt').value.trim(); if(!prompt){alert('Describe what you need first.');return;}
  const type=document.getElementById('ai-type').value,bizId=document.getElementById('ai-biz').value;
  const resultEl=document.getElementById('ai-result');
  resultEl.innerHTML=`<div class="ai-panel"><div class="ai-typing"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="margin-left:3px;">Building your template...</span></div></div>`;
  document.querySelector('.modal-footer .btn-ai').disabled=true;
  try {
    const res=await fetch(EDGE_FN_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON},body:JSON.stringify({prompt,type})});
    const parsed=await res.json();
    if(parsed.error) throw new Error(parsed.error);
    pendingAITemplate={...parsed,type,bizId};
    resultEl.innerHTML=`<div class="ai-panel">
      <div class="ai-panel-title">✓ Ready: "${parsed.name}"</div>
      <div style="font-size:.77rem;color:var(--muted);margin-bottom:7px;">${parsed.description}</div>
      <div style="font-size:.76rem;color:var(--text2);line-height:1.8;">${parsed.steps.map((s,i)=>`<div>${i+1}. ${s.title}</div>`).join('')}</div>
    </div>`;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="openAIModal()">Try Again</button><button class="btn btn-primary" onclick="acceptAITemplate()">Add Template</button>`;
  } catch(e){
    resultEl.innerHTML=`<div class="ai-panel" style="background:var(--danger-light);border-color:#fca5a5;"><div style="color:var(--danger);font-size:.8rem;">⚠ ${e.message}</div></div>`;
    document.querySelector('.modal-footer .btn-ai').disabled=false;
  }
}

async function acceptAITemplate(){
  if(!pendingAITemplate){toast('No template ready.','error');return;}
  const d=pendingAITemplate;
  const t=await dbInsert('templates',{biz_id:d.bizId,name:d.name,type:d.type,description:d.description,steps:d.steps.map(s=>({title:s.title,desc:s.desc||'',links:[],imageUrl:''}))});
  if(t){pendingAITemplate=null;closeModal();toast('Template created by AI!');navigate('template-detail',{id:t.id});}
}

// ── SOUND + CONFETTI ──────────────────────────────────────────
function playDing(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1108.73].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';osc.frequency.value=freq;
      const t=ctx.currentTime+i*.1;
      gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(.16,t+.01);gain.gain.exponentialRampToValueAtTime(.001,t+.38);
      osc.start(t);osc.stop(t+.38);
    });
  }catch(e){}
}
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.style.display='block';canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const colors=['#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#ffffff','#f472b6'];
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-10-Math.random()*180,r:5+Math.random()*6,d:2+Math.random()*3,color:colors[Math.floor(Math.random()*colors.length)],angle:0,tiltSpeed:.1+Math.random()*.3,shape:Math.random()>.5?'rect':'circle',w:6+Math.random()*8,h:3+Math.random()*5}));
  let frame=0;const max=190;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-frame/max);p.shape==='rect'?ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h):(ctx.beginPath(),ctx.arc(0,0,p.r/2,0,Math.PI*2),ctx.fill());ctx.restore();p.y+=p.d+Math.sin(p.angle)*.5;p.x+=Math.sin(p.angle*.5)*1.2;p.angle+=p.tiltSpeed;});
    frame++;
    if(frame<max)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  draw();
}

boot();
